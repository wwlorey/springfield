description = "Spec creation, refinement, and blessing"
alias = "sg"


[[iter]]
name = "discuss-and-interview"
prompt = "spec-gen-0-discuss-and-interview.md"
mode = "interactive"
produces = "discuss-and-interview-summary"

# [[iter]]
# name = "harden"
# prompt = "harden.md"
# mode = "interactive"
# produces = "discuss-and-interview-summary"


[[iter]]
name = "write"
prompt = "spec-gen-1-write.md"
mode = "afk"
iterations = 1
consumes = ["discuss-and-interview-summary"]
produces = "draft-presentation"
auto_push = true


[[iter]]
name = "review"
prompt = "spec-gen-2-review.md"
mode = "interactive"
consumes = ["discuss-and-interview-summary", "draft-presentation"]
next = "approve"

  [iter.transitions]
  on_revise = "revise"


[[iter]]
name = "revise"
prompt = "spec-gen-3-revise.md"
mode = "afk"
iterations = 1
consumes = ["discuss-and-interview-summary", "draft-presentation"]
produces = "draft-presentation"
next = "review"


[[iter]]
name = "approve"
prompt = "spec-gen-4-approve.md"
mode = "afk"

